steps:
  # -----------------------------------------------------------------------
  # 步驟 1: CI - 建立 Docker Image
  # 這會把你的 Python 程式與 dbt 邏輯打包
  # -----------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "europe-west2-docker.pkg.dev/$PROJECT_ID/uk-retail-repo/trainer:latest",
        ".",
      ]

  # -----------------------------------------------------------------------
  # 步驟 2: 推送 Image 到 Artifact Registry
  # 讓 Vertex AI 可以抓取這個環境
  # -----------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "europe-west2-docker.pkg.dev/$PROJECT_ID/uk-retail-repo/trainer:latest",
      ]

  # -----------------------------------------------------------------------
  # 步驟 3: CT - 觸發 Vertex AI Custom Training Job
  # 這會啟動一個 Serverless 訓練任務，跑你的 train_xgboost.py
  # -----------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "ai"
      - "custom-jobs"
      - "create"
      - "--region=europe-west2"
      - "--display-name=uk-retail-automated-training-$(short_sha)" # 使用 Git SHA 區分版本
      - "--worker-pool-spec=machine-type=n1-standard-4,container-image-uri=europe-west2-docker.pkg.dev/$PROJECT_ID/uk-retail-repo/trainer:latest"
      - "--command=python,train_xgboost.py"
      - "--args=--input-table=ml-time-series.hmm_retail_analysis_uk.stg_uk_retail"
      - "--service-account=service-1076021319818@gcp-sa-aiplatform.iam.gserviceaccount.com"

images:
  - "europe-west2-docker.pkg.dev/$PROJECT_ID/uk-retail-repo/trainer:latest"

options:
  logging: CLOUD_LOGGING_ONLY # 確保日誌直接進到 Google Cloud Logging
